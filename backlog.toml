# Backlog — source of truth for item STATE.
#
# This file is authoritative for status/size/kind/etc. The dashboard `BACKLOG.md` is
# GENERATED from it — never hand-edit BACKLOG.md. Regenerate after any change:
#     scripts/backlog bless      (== BLESS_BACKLOG=1 cargo test -p wordcartel --test backlog)
#
# Triage prose lives in docs/ux-backlog.md and docs/engineering-health.md, keyed to OPEN
# items by `<!-- item: ID -->` markers. The gate (wordcartel/tests/backlog.rs) enforces
# schema + marker↔manifest bijection (open items) + dashboard freshness. Add a capture with
# `scripts/backlog add`, or a `bl:` message.
#
# Fields: id, title, status, kind, size, theme, hook, doc, [blocks_effort_p], [depends_on],
# created; terminal-only: shipped_commit+shipped_date (shipped) / dropped_reason (dropped).
# Enums — status: triage|needs-design|ready|in-progress|watch|shipped|dropped ·
# kind: feature|bug|debt|chore|research · size: S|SM|M|L|XL|TBD ·
# theme: A B C D E H M R S P.

