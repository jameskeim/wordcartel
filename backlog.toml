[[item]]
id = "A20"
title = "Forward-only drafting mode — toggle that disables deletion (Write-or-Die style)"
status = "needs-design"
kind = "feature"
size = "SM"
theme = "A"
hook = "A toggle that DISABLES deletion (backspace / delete / cut) to force forward momentum through a first draft (Write-or-Die style). Pure input-filter toggle: no background work, no timer — on-brand for the 'drafting is hours, revision is weeks' thesis (a DRAFTING discipline; revision is where the lens/structure power lives). A registry command (toggle_forward_only, MenuMark::OnOff) that gates the delete/cut command paths while active. SAFETY: must NOT disable the toggle itself, navigation, save, or the recovery/undo safety net — there is always a way OUT; it blocks destructive EDITS, never the escape hatch. ~SM. Filed 2026-07-13 (helowrite comparison)."
doc = "ux-backlog.md#a20"
created = "2026-07-13"

