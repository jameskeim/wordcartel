hook = "Word-count GOAL for a document/session ('write 500 words') + a progress indicator in the chrome + words-added-this-session. EDGE-TRIGGERED off edits; builds on the shipped live word-count segment (render_status::word_count_segment) and the wordcount.lua P2 demo (a proto-goal). CORRECTION 2026-07-13: a session TIMER is NOT philosophically awkward — the plugin timer API is SHIPPED and idle-SAFE: wc.timer / wc.timer_cancel (P3 §3b, observer-tier), and the event loop blocks until the EARLIEST timer/swap deadline (timers.rs plugin_timer_deadline / next_due_ms), never polls. pomodoro.lua (tests/fixtures/plugins) is the P3 success-criterion demo of exactly this. So a pomodoro/session timer is available TODAY as a plugin (promote the fixture to a bundled plugin); A19's genuinely-new part is the goal/PROGRESS chrome, which a timer can drive. Related: PA (goals/streaks as post-P plugin). ~SM."
