# cargo-deny configuration — H18 supply-chain scan (Effort A, T7).
#
# Advisory-only: `cargo deny check` is a documented RELEASE-CHECKLIST step (see CLAUDE.md), not a
# merge GATE — a red result does not block. Promotion to a gate is a separate, deliberate edit.
#
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RUSTSEC vulnerabilities fail the scan by default (not separately configurable — always an
# error). Unmaintained-crate advisories are informational and always emit as warnings in this
# cargo-deny version (not a lint-level knob); `unmaintained` below only controls which crates are
# scanned for them.
unmaintained = "all"
yanked = "deny"
ignore = [
    # quick-xml v0.39.4, pulled in ONLY as a build-time proc-macro dependency of
    # wayland-scanner (which parses the static, repo-bundled Wayland protocol XML at compile
    # time to generate Rust bindings for wl-clipboard-rs's Wayland clipboard backend) — never
    # touches untrusted runtime input. No compatible upstream fix exists yet: the patch lives in
    # quick-xml >=0.41.0, a semver-major bump wayland-scanner has not picked up
    # (`cargo update -p quick-xml`/`-p wayland-scanner` both report nothing newer in range as of
    # 2026-07-11). Re-check on the next dependency-tree pass.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml build-time-only via wayland-scanner; no compatible fix available; static/trusted XML input only" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml build-time-only via wayland-scanner; no compatible fix available; static/trusted XML input only" },
    # paste (unmaintained) — build-time proc-macro pulled via burn-ndarray in harper-pos-utils
    # (harper-brill's tree, S7). No vulnerability, no safe upgrade, unavoidable with burn.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; build-time proc-macro pulled via burn-ndarray in harper-pos-utils; no vulnerability, no safe upgrade, unavoidable with burn" },
    # bincode (unmaintained) — serialization dep pulled via burn-core in the same harper-brill →
    # burn tree (S7). The team ceased development permanently (not a vulnerability); no safe
    # upgrade, unavoidable with burn.
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained (team ceased development; not a vulnerability); build-time serialization dep pulled via burn-core; no safe upgrade, unavoidable with burn" },
]

[licenses]
# The permissive set used by the tree. NOTE: burn RE-ENTERED the tree with S7's harper-brill
# dep (2026-07-17), so the previously-recorded "287 packages; burn removed" count is stale —
# re-run `cargo deny list` on the next supply-chain pass to refresh it.
#
# MPL-2.0 is allowed: it is weak, FILE-LEVEL copyleft — link-safe and it does not affect
# wordcartel's own license. Used by nucleo-matcher, option-ext (via dirs), and smartstring
# (MPL-2.0+) — all pre-existing deps already shipped in 0.3.0. (Reviewed 2026-07-11.)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    # tiny-keccak is CC0-1.0 (public-domain dedication; more permissive than the allowed MIT/Apache); pulled via burn's tree.
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
# crates.io only. The `repar` dependency is a local path dep (out of scope by nature — path
# deps aren't fetched from a registry or git source and this check doesn't see them).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
